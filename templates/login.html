{% extends "base.html" %}

{% block title %}Login | Godrej Smart Marketplace{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your Godrej Smart Marketplace account</p>

        <form method="POST" class="auth-form" novalidate>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>

        <p class="auth-footer">Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
    </div>
</section>
{% endblock %}
