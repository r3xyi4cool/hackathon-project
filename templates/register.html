{% extends "base.html" %}

{% block title %}Register | Godrej Smart Marketplace{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="auth-card">
        <h1>Create Account</h1>
        <p class="auth-subtitle">Join the Godrej Smart Marketplace community</p>

        <form method="POST" class="auth-form" novalidate>
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" required placeholder="Your full name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required placeholder="+91 98765 43210">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="At least 6 characters">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Register</button>
        </form>

        <p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
    </div>
</section>
{% endblock %}
